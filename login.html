<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="stylesheet" href="auth.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
</head>

<body>

    <main class="container">
        <div class="glass-card">

            <div class="brand-header animate-fade-in-up delay-1">
                <div class="logo-container">
                    <img src="logo.png" alt="Stock Streets" class="auth-logo" />
                </div>
            </div>

            <form id="loginForm">

                <div id="formErrorSummary" class="error-summary"></div>

                <div class="form-group animate-fade-in-up delay-2">
                    <label for="loginMobile">Mobile Number</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-outlined icon">smartphone</span>
                        <input type="tel" id="loginMobile" name="loginMobile" placeholder="enter Your Mobile Number"
                             maxlength="10" pattern="\d{10}" required>
                    </div>
                </div>

                <div class="form-group animate-fade-in-up delay-3">
                    <label for="loginPin">Security PIN (6 Digits)</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-outlined icon">lock</span>
                        <input type="password" id="loginPin" name="loginPin" class="font-mono" maxlength="6"
                            pattern="\d{6}" placeholder="••••••" required>
                        <span class="material-symbols-outlined icon-right" id="toggleLoginPin">visibility</span>
                    </div>
                </div>

                <div class="forgot-pin-wrapper animate-fade-in-up delay-4">

                    <a href="forgotpin.html" class="forgot-pin-link">

                        Forgot PIN?

                    </a>

                </div>

                <button type="submit" class="submit-btn animate-fade-in-up delay-5">
                    Login
                    <span class="material-symbols-outlined">login</span>
                </button>
            </form>

            <div class="login-link animate-fade-in-up delay-6">
                <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
            </div>

        </div>
    </main>

    <script src="config.js"></script>
    <script src="auth-bg.js"></script>
    <script src="login.js"></script>
</body>

</html>
